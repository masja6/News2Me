<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ digest.title }} · {{ date_key }}</title>
<meta property="og:title" content="{{ digest.title }} — {{ date_key }}">
<meta property="og:description" content="{{ digest.summaries|length }} stories · NewsToMe">
<meta name="twitter:card" content="summary">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f7f7f9; color: #111; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 680px; margin: 0 auto; padding: 32px 20px 80px; }
  .header { padding: 24px; background: #111; color: #fff; border-radius: 16px; margin-bottom: 20px; }
  .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
  .header .sub { color: #aaa; font-size: 13px; margin-top: 4px; }
  .back { display: inline-block; margin-bottom: 16px; color: #666; font-size: 13px; text-decoration: none; }
  .back:hover { color: #1b4aef; }
  .card { background: #fff; border-radius: 16px; padding: 16px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .story { padding: 18px 0; border-bottom: 1px solid #f0f0f0; }
  .story:last-child { border-bottom: none; }
  .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; font-size: 11px; color: #888; }
  .cat { background: #e8eeff; color: #1b4aef; border-radius: 100px; padding: 2px 10px; font-weight: 700; }
  .headline { font-size: 17px; font-weight: 700; line-height: 1.3; margin-bottom: 6px; }
  .body { font-size: 14px; color: #444; line-height: 1.6; margin-bottom: 8px; }
  .link { font-size: 13px; color: #1b4aef; text-decoration: none; font-weight: 600; }
  .link:hover { text-decoration: underline; }
  .footer { margin-top: 24px; text-align: center; color: #999; font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/d">← All digests</a>
  <div class="header">
    <h1>✦ {{ digest.title }}</h1>
    <div class="sub">{{ date_key }} · {{ digest.summaries|length }} stories</div>
  </div>
  <div class="card">
    {% for s in digest.summaries %}
    <div class="story">
      <div class="meta">
        <span class="cat">{{ s.category }}</span>
        <span>{{ s.source }}</span>
      </div>
      <div class="headline">{{ s.headline }}</div>
      <div class="body">{{ s.body }}</div>
      <a class="link" href="{{ s.url }}" target="_blank" rel="noopener">Read the source →</a>
    </div>
    {% endfor %}
  </div>
  <div class="footer">NewsToMe · Powered by Shelby Co.</div>
</div>
</body>
</html>
