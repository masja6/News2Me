name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest deepeval langfuse google-auth

      - name: Byte-compile package (catches syntax errors early)
        run: python -m compileall newstome

      - name: Run tests and evals
        env:
          ANTHROPIC_API_KEY: dummy-for-import
        run: pytest -q --tb=short
