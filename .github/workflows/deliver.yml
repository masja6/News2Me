name: Hourly Delivery

on:
  schedule:
    # Fires every hour at :00 UTC.
    # Per-user timezone logic inside the app sends each subscriber
    # at their own preferred local hour (default 7 AM IST = 1:30 AM UTC).
    - cron: '0 * * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Render and wait for ready
        run: |
          echo "Waking up Render service..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ secrets.APP_URL }}/" || echo "000")
            echo "  Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "307" ] || [ "$STATUS" = "302" ]; then
              echo "Service is up!"
              break
            fi
            if [ "$i" = "12" ]; then
              echo "Service did not wake after 2 minutes"
              exit 1
            fi
            sleep 10
          done

      - name: Trigger hourly delivery
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            --max-time 120 \
            -X POST "${{ secrets.APP_URL }}/cron/deliver" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}")
          echo "Full response: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Delivery trigger failed with status $STATUS"
            exit 1
          fi
